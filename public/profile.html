<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innerversse | Profil User</title>

  <script>
    window.tailwind = window.tailwind || {};
    tailwind.config = { darkMode: 'class' }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

 <link rel="stylesheet" href="stylespp.css">
</head>

<body class="bg-gray-50 text-gray-900">

  <!-- LOADING OVERLAY -->
  <div id="pageLoader" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center">
    <div class="w-12 h-12 border-4 border-gray-200 border-t-blue-500 rounded-full animate-spin"></div>
    <p class="mt-4 text-gray-500 font-semibold">Memuat Profil<span class="animate-pulse">...</span></p>
  </div>

  <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="text-blue-500 font-bold flex items-center gap-2 hover:underline">
        <span>←</span> Kembali ke Feed
      </a>

      <button id="themeToggle"
        class="text-xs font-extrabold px-3 py-1 rounded-full border border-gray-200 bg-white hover:bg-gray-50 transition shadow-sm"
        title="Mode Terang/Gelap">🌙</button>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto mt-4 pb-20">

    <!-- Header profile -->
    <div class="mx-4 bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
      <div class="flex items-center gap-4">
        <div id="profileIcon" class="w-16 h-16 rounded-full bg-blue-500 flex items-center justify-center text-white text-2xl font-black uppercase shadow-inner">
          ?
        </div>

        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2 flex-wrap">
            <h2 id="profileUsername" class="text-xl md:text-2xl font-black text-gray-900 tracking-tight truncate">@loading</h2>
            <span id="profileBadge" class="hidden text-[10px] font-extrabold px-2 py-0.5 rounded-full border"></span>
          </div>

          <div class="mt-1 flex items-center gap-2 flex-wrap">
            <span id="postCount" class="text-xs font-bold text-gray-500">0 Postingan</span>
            <span class="text-[10px] text-gray-400">•</span>
            <span id="likeTotal" class="text-xs font-bold text-gray-500">❤️ 0</span>
            <span class="text-[10px] text-gray-400">•</span>
            <span id="viewTotal" class="text-xs font-bold text-gray-500">👁️ 0</span>
          </div>

          <div class="mt-2 text-[11px] text-gray-400">
            Profil ini mengikuti tampilan feed utama.
          </div>
        </div>
      </div>
    </div>

    <!-- Section title -->
    <div class="mx-4 mt-5 mb-2 flex items-center justify-between">
      <h3 class="font-extrabold text-gray-400 text-xs uppercase tracking-[0.2em]">Koleksi Postingan</h3>
    </div>

    <div id="userPosts" class="mx-4">
      <div class="p-10 text-center text-gray-400 italic">Memuat postingan...</div>
    </div>
  </main>

 <script type="module" src="profileapp.js"></script>
</body>
          </html>
