<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 | Halaman Tidak Ditemukan</title>

  <style>
    :root{
      --bg: #0b1220;
      --panel: rgba(15,23,42,.86);
      --border: rgba(148,163,184,.18);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --brand: #3b82f6;
      --brand2:#22d3ee;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 700px at 20% 10%, rgba(59,130,246,.25), transparent 55%),
                  radial-gradient(900px 650px at 80% 70%, rgba(34,211,238,.18), transparent 55%),
                  var(--bg);
      color: var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
    }

    .card{
      width: min(520px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 20px;
      box-shadow: 0 18px 70px rgba(0,0,0,.45);
      position: relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute; inset:-2px;
      background: linear-gradient(90deg, rgba(59,130,246,.45), rgba(34,211,238,.35), rgba(168,85,247,.35));
      filter: blur(18px);
      opacity:.35;
      pointer-events:none;
    }

    .top{
      display:flex;
      align-items:center;
      gap:12px;
      position: relative;
      z-index: 1;
    }

    .badge{
      font-weight: 900;
      font-size: 11px;
      letter-spacing: .16em;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(59,130,246,.14);
      border: 1px solid rgba(59,130,246,.28);
      color: #bfdbfe;
    }

    h1{
      margin: 14px 0 6px;
      font-size: 20px;
      line-height: 1.25;
      position: relative;
      z-index: 1;
    }

    p{
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      position: relative;
      z-index: 1;
    }

    .code{
      display:inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(148,163,184,.12);
      border: 1px solid rgba(148,163,184,.18);
      color: #e2e8f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }

    a.btn{
      text-decoration:none;
      font-weight: 800;
      font-size: 13px;
      padding: 11px 14px;
      border-radius: 14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      transition: transform .08s ease, background .18s ease, border-color .18s ease;
      user-select:none;
    }

    .btn-primary{
      background: linear-gradient(90deg, rgba(59,130,246,.95), rgba(34,211,238,.85));
      color: #081018;
      border: 1px solid rgba(255,255,255,.10);
    }
    .btn-primary:active{ transform: scale(.98); }

    .btn-ghost{
      background: rgba(148,163,184,.10);
      border: 1px solid rgba(148,163,184,.18);
      color: var(--text);
    }
    .btn-ghost:hover{ background: rgba(148,163,184,.14); }

    .footer{
      margin-top: 14px;
      font-size: 12px;
      color: rgba(148,163,184,.75);
      position: relative;
      z-index: 1;
    }

    @media (max-width: 420px){
      .card{ padding: 18px 16px; border-radius: 16px; }
      h1{ font-size: 18px; }
      p{ font-size: 13px; }
      a.btn{ width: 100%; justify-content:center; }
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-label="404">
    <div class="top">
      <span class="badge">404</span>
      <span style="color: rgba(226,232,240,.9); font-weight: 900; font-size: 13px;">Innerversse</span>
    </div>

    <h1>Halaman tidak ditemukan</h1>
    <p>
      Link yang kamu buka nggak ada / sudah dipindah.
      Coba cek URL-nya ya.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="index.html">🏠 Balik ke Beranda</a>
      <a class="btn btn-ghost" href="javascript:history.back()">↩️ Kembali</a>
    </div>

    <div class="footer">
      File: <span class="code">404.html</span> • Firebase Hosting
    </div>
  </main>
</body>
</html>
